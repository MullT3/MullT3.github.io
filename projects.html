---
layout: projects
permalink: /projects/
---

<div class="projects-container projects-wide">

  <h1 class="projects-title">Work</h1>
  <h2 class="projects-subtitle">Bits from jobs I've worked on over the years</h2>

  <div class="gallery" id="gallery"></div>

</div>

<!-- VIEWER -->
<div class="project-viewer" id="project-viewer">
  <span class="close" id="viewer-close">&times;</span>
  <div class="viewer-exit-zone" id="viewer-exit"></div>
  <div class="viewer-counter" id="viewer-counter">1 / 1</div>
  <div class="viewer-scroll" id="viewer-scroll"></div>

  <div class="viewer-zone left" id="viewer-left"></div>
  <div class="viewer-zone right" id="viewer-right"></div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen-viewer" id="fullscreen-viewer">
  <span class="close" id="fs-close">&times;</span>
  <img id="fullscreen-img">
</div>

<style>

.projects-title {
  text-align: center;
  margin-bottom: 30px;
}

.projects-subtitle {
  text-align: center;
  margin-bottom: 10px;
  font-size: 12px;
}

.projects-wide {
  max-width: 750px; /* This control the width of grid on the page. Need to adjust to make 3/4 to the right.*/
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== GRID ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  grid-auto-rows: 260px;
  gap: 20px;
}

/*.gallery {
  display: grid;
  gap: 12px;
}*/

/* 🔥 Desktop + Large screens */
/*@media (min-width: 900px) {
  .gallery {
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 260px;
  }
}*/

/* 📱 Tablet */
/*@media (max-width: 899px) {
  .gallery {
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 260px;
  }
}*/

/* 📱 Small mobile (optional but recommended) */
/*@media (max-width: 500px) {
  .gallery {
    grid-template-columns: 1fr;
    grid-auto-rows: 260px;
  }
}*/

/* ===== CARD ===== */
.gallery-item {
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

/* IMAGE */
.gallery-item img {
  width: 105%;
  height: 105%;
  object-fit: cover;
  transition: transform 0.4s ease;

  /* 👇 TRUE EDGE SOFTEN (no overlay, no text fade) */
  -webkit-mask-image: radial-gradient(circle, black 70%, transparent 100%);
  mask-image: radial-gradient(circle, black 70%, transparent 100%);
}

.gallery-item {
  transition: transform 0.25s ease;
}

.gallery-item:hover {
  transform: translateY(-4px);
}

.gallery-item img {
  transition: transform 0.4s ease;
}

.gallery-item:hover img {
  transform: scale(1.05);
}

/* ===== TEXT (SEPARATED) ===== */
.overlay {
  position: absolute;
  bottom: 0px;
  left: 5px;
  right: 5px;

  padding: 5px 5px;

  background: rgba(255, 255, 255, 0.8); /* soft white */
  backdrop-filter: blur(6px);            /* glass effect */

  border-radius: 0px;

  color: #000;
}

/* TITLE */
.overlay .title {
  /*color: black;
  -webkit-text-fill-color: white; Some fun with text outlines.
  -webkit-text-stroke: 0.5px black;
  */ 
  font-size: 16px;
  font-weight: 600;
}

/* SUBTITLE */
.overlay .subtitle {
  font-size: 10px;
  opacity: 0.7;
}

/* ===== VIEWER ===== */
.project-viewer {
  position: fixed;
  inset: 0;
  background: rgb(255, 255, 255);
  backdrop-filter: blur(6px);
  display: none;
  z-index: 1000;
}
.project-viewer.active { display: block; }

/* EXIT ZONE */
.viewer-exit-zone {
  position: absolute;
  top: 0;
  right: 0;
  width: 25%;
  height: 80px;
  z-index: 30;
}

/* SCROLL */
.viewer-scroll {
  display: flex;
  align-items: center;
  height: 100%;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

.viewer-scroll img {
  flex: 0 0 auto;
  max-width: 80vw;
  max-height: 80vh;
  margin: 0 40px;
  scroll-snap-align: center;
  cursor: default;
}

.viewer-scroll img.center-hover {
  cursor: zoom-in;
}

/* NAV */
.viewer-zone {
  position: absolute;
  top: 0;
  width: 30%;
  height: 100%;
}

.viewer-zone.left { left: 0; }
.viewer-zone.right { right: 0; }

/* ARROWS */
.viewer-zone::after {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 36px;
  color: rgba(0,0,0,0.25);
  opacity: 0;
  transition: opacity 0.2s;
}

.viewer-zone.left::after { content: "←"; left: 20px; }
.viewer-zone.right::after { content: "→"; right: 20px; }

.viewer-zone:hover::after { opacity: 1; }

/* COUNTER */
.viewer-counter {
  position: absolute;
  top: 20px;
  left: 30px;
}

/* ===== FULLSCREEN ===== */
.fullscreen-viewer {
  position: fixed;
  inset: 0;
  background: #fff;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.fullscreen-viewer.active { display: flex; }

.fullscreen-viewer img {
  max-width: 90vw;
  max-height: 90vh;
}

/* CLOSE */
.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  cursor: pointer;
}

</style>

<script src="/js/projects.js"></script>

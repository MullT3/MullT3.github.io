<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width initial-scale=1">

  <div class="projects-container">
    <h1 class="projects-title">Work</h1>
    <h2 class="projects-subtitle">Bits from jobs I've worked on over the years</h2>

    <div class="gallery" id="gallery"></div>
  </div>

  <!-- VIEWER -->
  <div class="project-viewer" id="project-viewer">
    <span class="close" id="viewer-close">&times;</span>

    <!-- TOP CLICK EXIT ZONE -->
    <div class="viewer-exit-zone" id="viewer-exit"></div>

    <!-- COUNTER -->
    <div class="viewer-counter" id="viewer-counter">1 / 1</div>

    <div class="viewer-scroll" id="viewer-scroll"></div>

    <!-- NAV -->
    <div class="viewer-zone left" id="viewer-left"></div>
    <div class="viewer-zone right" id="viewer-right"></div>
  </div>

  <!-- FULLSCREEN -->
  <div class="fullscreen-viewer" id="fullscreen-viewer">
    <span class="close" id="fs-close">&times;</span>
    <img id="fullscreen-img">
  </div>

  <style>
  /* ===== GRID ===== */
    .projects-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .projects-subtitle {
      text-align: center;
      margin-bottom: 10px;
      font-size: 12px;
    }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    grid-auto-rows: 260px;
    gap: 10px;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  /* IMAGE */
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .gallery-item:hover img {
    transform: scale(1.05);
  }

  /* EDGE FADE */
  .gallery-item::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;

    background: radial-gradient(
      circle,
      transparent 20%,
      rgba(255, 255, 255, 0.5) 85%,
      rgba(255, 255, 255, 0.85) 100%
    );

    opacity: 0.7;
    transition: opacity 0.3s ease;
  }

  .gallery-item:hover::after {
    opacity: 0.3;
  }

  /* TITLE + SUBTITLE */
  .overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;

    background: linear-gradient(
      to top,
      rgb(255, 255, 255),
      rgb(255, 255, 255),
      transparent
    );

    color: #000000;
  }

  .overlay strong {
    display: block;
    font-size: 14px;

  }

  .overlay span {
    font-size: 12px;
    opacity: 0.8;
  }

  /* ===== VIEWER ===== */
  .project-viewer {
    position: fixed;
    inset: 0;

    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(6px);

    display: none;
    z-index: 1000;
  }

  .project-viewer.active {
    display: block;
  }

  /* EXIT ZONE (TOP RIGHT AREA) */
  .viewer-exit-zone {
    position: absolute;
    top: 0;
    right: 0;
    width: 25%;
    height: 80px;
    z-index: 30;
    cursor: pointer;
  }

  .viewer-scroll {
    display: flex;
    align-items: center;
    height: 100%;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
  }

  .viewer-scroll img {
    flex: 0 0 auto;
    max-width: 80vw;
    max-height: 80vh;
    margin: 0 40px;
    object-fit: contain;
    scroll-snap-align: center;
    cursor: default;
  }

  .viewer-scroll img.center-hover {
    cursor: zoom-in;
  }

  /* NAV ZONES */
  .viewer-zone {
    position: absolute;
    top: 0;
    width: 30%;
    height: 100%;
    z-index: 10;
  }

  .viewer-zone.left { left: 0; }
  .viewer-zone.right { right: 0; }

  /* ARROWS */
  .viewer-zone::after {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 36px;
    color: rgba(0,0,0,0.25);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .viewer-zone.left::after {
    content: "←";
    left: 20px;
  }

  .viewer-zone.right::after {
    content: "→";
    right: 20px;
  }

  .viewer-zone:hover::after {
    opacity: 1;
  }

  /* COUNTER */
  .viewer-counter {
    position: absolute;
    top: 20px;
    left: 30px;
    font-size: 14px;
    color: #333;
    z-index: 20;
  }

  /* ===== FULLSCREEN ===== */
  .fullscreen-viewer {
    position: fixed;
    inset: 0;
    background: #fff;

    display: none;
    align-items: center;
    justify-content: center;

    z-index: 2000;
  }

  .fullscreen-viewer.active {
    display: flex;
  }

  .fullscreen-viewer img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
  }

  /* CLOSE */
  .close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 28px;
    cursor: pointer;
  }
  </style>

  <script src="/js/projects.js"></script>

  </body>
</html>
